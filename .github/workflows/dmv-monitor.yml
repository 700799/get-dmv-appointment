name: DMV Monitor

on:
  schedule:
    # Every 30 minutes — reliable substitute for Vercel Hobby's 1/day cron limit.
    # The app enforces its own schedule window (days/hours/min-interval) server-side,
    # so pinging more often than needed is safe — idle checks exit early.
    - cron: "*/30 * * * *"
    # Weekly password rotation — Monday 8:00 AM UTC
    - cron: "0 8 * * 1"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      action:
        description: "Which action to run"
        required: true
        default: check
        type: choice
        options:
          - check
          - rotate-password

jobs:
  dmv-check:
    name: DMV availability check
    # Only run on the 30-min schedule OR a manual "check" dispatch.
    # Skip this job when the weekly password schedule fires (handled in rotate-password job).
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/30 * * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'check')
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Trigger DMV check
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret is not set. Add it in Settings → Secrets → Actions."
            exit 1
          fi
          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --max-time 330 \
            "${APP_URL}/api/check")
          EXIT=$?
          echo "$RESPONSE" | python3 -m json.tool 2>/dev/null || echo "$RESPONSE"
          if [ $EXIT -ne 0 ]; then
            echo "::warning::curl failed with exit code $EXIT"
          fi

  rotate-password:
    name: Rotate weekly password
    # Only run on the Monday 8am schedule OR a manual "rotate-password" dispatch.
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rotate-password')
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Rotate login password
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret is not set."
            exit 1
          fi
          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            --max-time 30 \
            "${APP_URL}/api/rotate-password")
          EXIT=$?
          echo "$RESPONSE" | python3 -m json.tool 2>/dev/null || echo "$RESPONSE"
          if [ $EXIT -ne 0 ]; then
            echo "::error::Password rotation failed (exit $EXIT)"
            exit 1
          fi
